server {
    listen 80;
    server_name app.seidmannapi.com seidmanninstitute.com www.seidmanninstitute.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name seidmanninstitute.com www.seidmanninstitute.com;
    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/seidmanninstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seidmanninstitute.com/privkey.pem;

    location /uploads/ {
        alias /var/www/uploads/;
    }

    location ~ ^/api/(students|teachers|schedules|payments|users/me) {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

